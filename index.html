<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Doação de sangue</title>
</head>
<body>
    <main>


        <div class="container flex">
            <h2>Cadastre-se</h2>
            <form action="" id="formulario">

                <label for="nome">Nome:</label><br>
                <div class="flex inputarea">
                <input type="text" id="nome" placeholder="Insira seu nome" required><br>
                </div>

                <br>

                <label for="email">Email:</label><br>
                <div class="flex inputarea">
                <input type="email" id="email" placeholder="Insira seu email" required><br>
                </div>

                <br>

                <label for="idade">Idade:</label><br>
                <div class="flex inputarea">
                <input type="number"  id="idade"  required><br>
                </div>

                <br>

                <label for="peso">Peso(kg):</label><br>
                <div class="flex inputarea">
                <input type="number" id="peso"  required> <br>
                </div>

                <br>

                <label for="sangue">Tipo Sanguíneo:</label><br><br>
                <div class="flex inputarea">
                <select name="sangue" id="sangue">
                    <option selected disabled>Selecione seu tipo sanguineo</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select><br>
                </div>

                <br>

                <label for="telefone">Telefone:</label><br>
                <div class="flex inputarea">
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" required> <br>
                </div>

                <br>

                <label for="estado">Estado:</label><br>
                <div class="flex inputarea">
                <input type="text" id="estado" placeholder="Insira seu estado" required> <br>
                </div>

                <br>

                <label for="cidade">Cidade:</label><br>
                <div class="flex inputarea">
                <input type="text" id="cidade" placeholder="Insira sua cidade" required> <br>
                </div>

                <br>

                <div class="flex">
                    <button type="submit">Enviar</button>
                </div>
                
            </form>


        </div>

    </main>
</body>
<script src="script.js"></script>
</html>
